# cargo-deny configuration — run with: cargo deny check
# See https://embarkstudios.github.io/cargo-deny/

# ── Advisory database ─────────────────────────────────────────────────────────

[advisories]
# Fetch the RustSec advisory database on each run.
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny >= 0.16 uses scope strings for unmaintained/unsound:
#   "all" | "workspace" | "transitive" | "none"
# Vulnerabilities in any crate are hard failures.
# Unmaintained crates anywhere in the tree are flagged (workspace = direct only).
unmaintained = "workspace"
# Unsound code anywhere in the dependency tree is a hard failure.
unsound = "all"
# Yanked crates: warn rather than fail (they may be in the lock file legitimately).
yanked = "warn"
# Advisory IDs to suppress (add RUSTSEC-YYYY-NNNN entries here after review).
ignore = []

# ── License policy ────────────────────────────────────────────────────────────

[licenses]
# cargo-deny >= 0.16: only 'allow', 'exceptions', and 'confidence-threshold'
# remain. Anything not in the allow list is implicitly denied.
allow = [
    "GPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]
exceptions = []
# Confidence threshold for fuzzy SPDX matching (0.8 is cargo-deny default).
confidence-threshold = 0.8

# ── Crate bans ────────────────────────────────────────────────────────────────

[bans]
# Multiple versions of the same crate are warnings — often unavoidable
# transiently but should be resolved over time.
multiple-versions = "warn"
# Deny crates known to have been involved in supply-chain attacks or that
# have no legitimate use in a security SDK.
deny = []
# Skip duplicate-version warnings for crates where version fragmentation is
# an accepted upstream reality.
skip = []
skip-tree = []

# ── Source policy ─────────────────────────────────────────────────────────────

[sources]
# Only allow crates from crates.io; git sources are not audited by RustSec.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
